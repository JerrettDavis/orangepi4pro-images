MENU TITLE Orange Pi 4 Pro Cyberdeck Boot Selector
PROMPT 1
TIMEOUT 200
DEFAULT ubuntu-nvme

LABEL ubuntu-nvme
  MENU LABEL 1 Ubuntu NVMe - cyberdeck kernel
  LINUX ../uImage-5.15.147-sun60iw2-cyberdeck
  INITRD ../uInitrd-5.15.147-sun60iw2-cyberdeck
  FDT ../dtb-5.15.147-sun60iw2-cyberdeck/allwinner/sun60i-a733-orangepi-4-pro.dtb
  APPEND root=UUID=eb86cfeb-60c7-4513-bc69-f6d28e9d561b bootchooser=extlinux-legacy-nvme rootwait rootfstype=ext4 splash plymouth.ignore-serial-consoles earlyprintk=sunxi-uart,0x02500000 initcall_debug=0 console=ttyS0,115200 console=tty1 consoleblank=0 loglevel=3 clk_ignore_unused swiotlb=65536 cgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory swapaccount=1

LABEL ubuntu-sd
  MENU LABEL 2 Ubuntu SD - stock kernel
  LINUX ../uImage-5.15.147-sun60iw2
  INITRD ../uInitrd-5.15.147-sun60iw2
  FDT ../dtb-5.15.147-sun60iw2/allwinner/sun60i-a733-orangepi-4-pro.dtb
  APPEND root=UUID=dc683cb4-0847-4d2f-83f1-184d35749d4c bootchooser=extlinux-legacy-sd rootwait rootfstype=ext4 splash plymouth.ignore-serial-consoles earlyprintk=sunxi-uart,0x02500000 initcall_debug=0 console=ttyS0,115200 console=tty1 consoleblank=0 loglevel=3 clk_ignore_unused swiotlb=65536 cgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory swapaccount=1

LABEL ubuntu-nvme-verbose
  MENU LABEL 3 Ubuntu NVMe - verbose boot
  LINUX ../uImage-5.15.147-sun60iw2-cyberdeck
  INITRD ../uInitrd-5.15.147-sun60iw2-cyberdeck
  FDT ../dtb-5.15.147-sun60iw2-cyberdeck/allwinner/sun60i-a733-orangepi-4-pro.dtb
  APPEND root=UUID=eb86cfeb-60c7-4513-bc69-f6d28e9d561b bootchooser=extlinux-legacy-nvme rootwait rootfstype=ext4 console=ttyS0,115200 console=tty1 consoleblank=0 loglevel=7 clk_ignore_unused swiotlb=65536
